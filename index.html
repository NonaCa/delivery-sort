<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>配達ソート</title>

<style>
body { margin:0; font-family:-apple-system; background:#f2f2f7;}
.container { padding:12px;}

.top-tabs { display:flex;}
.top-tab { flex:1; padding:12px; text-align:center; background:#ddd;}
.top-tab.active { background:#007aff;color:#fff;}

.hidden{display:none;}

.tabs{display:flex;overflow-x:auto;margin:8px 0;}
.tab{padding:8px 12px;background:#ddd;border-radius:10px;margin-right:6px;}
.tab.active{background:#007aff;color:#fff;}

.card{background:#fff;border-radius:12px;padding:10px;margin-bottom:10px;}

input,textarea{width:100%;padding:10px;border:none;}
textarea{height:90px;}

.zone-block{margin-bottom:10px;}
.zone-title{font-weight:bold;margin-bottom:4px;}

.item{
  display:flex;
  align-items:center;
  padding:10px;
  border-bottom:1px solid #eee;
}

.handle{
  font-size:18px;
  margin-right:10px;
  cursor:grab;
}

.dragging{
  opacity:0.5;
}

.addr{
  flex:1;
}

button{
  width:100%;
  padding:12px;
  border:none;
  border-radius:10px;
  background:#007aff;
  color:#fff;
  margin-top:6px;
}

.small-btn{
  width:auto;
  background:#ff3b30;
  padding:6px 10px;
  font-size:12px;
}
</style>
</head>

<body>

<div class="container">

<div class="top-tabs">
  <div class="top-tab active" onclick="switchPage('delivery')">🚚 配達</div>
  <div class="top-tab" onclick="switchPage('master')">🛠️ マスタ作成</div>
</div>

<div id="deliveryPage">

<div id="tabs" class="tabs"></div>

<div class="card">
  <input id="search" placeholder="住所検索（かなOK）">
  <div id="suggest"></div>
</div>

<div class="card">
  <div id="zoneTitle"></div>
  <div id="result"></div>
</div>

</div>

<div id="masterPage" class="hidden">

<div class="card">
  <div>📂 CSVファイル</div>
  <input type="file" id="csvFile">
  <button onclick="importCSVFile()">読み込み</button>
</div>

<div class="card">
  <div>✏️ CSVテキスト</div>
  <textarea id="csvText"></textarea>
  <button onclick="importCSVText()">読み込み</button>
</div>

<div class="card">
  <input id="zoneInput" placeholder="区間">
  <textarea id="addressInput" placeholder="住所（改行）"></textarea>
  <button onclick="addMaster()">追加</button>
</div>

<div id="masterList"></div>

<button onclick="exportCSV()">CSVコピー</button>

</div>

</div>

<script>

let master = JSON.parse(localStorage.getItem("master")||"[]");
let selected = JSON.parse(localStorage.getItem("selected")||"{}");
let zones=[];
let currentZone="";

const hiraMap={"にし":"西","ひがし":"東","みなみ":"南","きた":"北"};
function normalize(t){
  Object.keys(hiraMap).forEach(k=>{ if(t.includes(k)) t=t.replace(k,hiraMap[k]); });
  return t;
}

function saveAll(){
  localStorage.setItem("master",JSON.stringify(master));
  localStorage.setItem("selected",JSON.stringify(selected));
}

function parseCSV(text){
  const lines=text.trim().split("\n");
  const h=lines[0].split(",");
  const zi=h.indexOf("zone"), oi=h.indexOf("order"), ai=h.indexOf("address");

  master=lines.slice(1).map(l=>{
    const c=l.split(",");
    return {zone:c[zi],order:Number(c[oi]),address:c[ai]};
  }).filter(x=>x.address);

  updateZones();
  renderMaster();
  render();
  saveAll();
}

function importCSVFile(){
  const f=document.getElementById("csvFile").files[0];
  const r=new FileReader();
  r.onload=e=>parseCSV(e.target.result);
  r.readAsText(f);
}

function importCSVText(){
  parseCSV(document.getElementById("csvText").value);
}

function addMaster(){
  const z=document.getElementById("zoneInput").value;
  const lines=document.getElementById("addressInput").value.split("\n");

  lines.forEach(l=>{
    if(l.trim()){
      master.push({zone:z,address:l.trim(),order:master.length+1});
    }
  });

  updateZones();
  renderMaster();
  saveAll();
}

function updateZones(){
  zones=[...new Set(master.map(m=>m.zone))];
  currentZone=currentZone||zones[0];
  renderTabs();
}

function renderTabs(){
  const tabs=document.getElementById("tabs");
  tabs.innerHTML="";
  zones.forEach(z=>{
    const d=document.createElement("div");
    d.className="tab";
    d.textContent=z;
    if(z===currentZone)d.classList.add("active");
    d.onclick=()=>{currentZone=z; render(); renderTabs();};
    tabs.appendChild(d);
  });
}

// ===== ドラッグ修正版 =====
let draggingEl = null;

function renderMaster(){
  const box=document.getElementById("masterList");
  box.innerHTML="";

  zones.forEach(z=>{
    const block=document.createElement("div");
    block.className="card zone-block";

    const title=document.createElement("div");
    title.className="zone-title";
    title.textContent=`区間 ${z}`;
    block.appendChild(title);

    const list = master.filter(m=>m.zone===z).sort((a,b)=>a.order-b.order);

    list.forEach(m=>{
      const div=document.createElement("div");
      div.className="item";

      const handle=document.createElement("div");
      handle.className="handle";
      handle.textContent="≡";

      handle.draggable=true;

      handle.ondragstart=(e)=>{
        draggingEl = div;
        div.classList.add("dragging");
      };

      handle.ondragend=()=>{
        div.classList.remove("dragging");
        draggingEl=null;
        reOrder(z);
      };

      div.ondragover=(e)=>{
        e.preventDefault();
        const target = div;
        if(!draggingEl || draggingEl===target) return;

        const rect = target.getBoundingClientRect();
        const offset = e.clientY - rect.top;

        if(offset > rect.height / 2){
          target.after(draggingEl);
        }else{
          target.before(draggingEl);
        }
      };

      const addr=document.createElement("div");
      addr.className="addr";
      addr.textContent=m.address;

      const del=document.createElement("button");
      del.className="small-btn";
      del.textContent="削除";
      del.onclick=()=>deleteItem(z,m.address);

      div.appendChild(handle);
      div.appendChild(addr);
      div.appendChild(del);

      block.appendChild(div);
    });

    box.appendChild(block);
  });
}

function reOrder(zone){
  const blocks=[...document.querySelectorAll(".zone-block")];
  const block=blocks.find(b=>b.innerText.includes(zone));
  if(!block) return;

  const items=[...block.querySelectorAll(".item")];

  items.forEach((el,i)=>{
    const addr=el.querySelector(".addr").textContent;
    const t=master.find(m=>m.zone===zone && m.address===addr);
    if(t) t.order=i+1;
  });

  saveAll();
}

function deleteItem(z,a){
  master=master.filter(m=>!(m.zone===z && m.address===a));
  updateZones();
  renderMaster();
  saveAll();
}

function exportCSV(){
  let csv="zone,order,address\n";
  master.forEach(m=>csv+=`${m.zone},${m.order},${m.address}\n`);
  navigator.clipboard.writeText(csv);
  alert("コピー完了");
}

// 配達
search.addEventListener("input", ()=>{
  const val=normalize(search.value);
  suggest.innerHTML="";
  master.filter(m=>m.zone===currentZone && m.address.includes(val))
    .slice(0,10)
    .forEach(item=>{
      const d=document.createElement("div");
      d.textContent=item.address;
      d.onclick=()=>addItem(item);
      suggest.appendChild(d);
    });
});

function addItem(item){
  if(!selected[currentZone]) selected[currentZone]=[];
  selected[currentZone].push(item);
  selected[currentZone].sort((a,b)=>a.order-b.order);
  saveAll();
  render();
}

function render(){
  result.innerHTML="";
  (selected[currentZone]||[]).forEach((m,i)=>{
    const d=document.createElement("div");
    d.textContent=`${i+1}. ${m.address}`;
    result.appendChild(d);
  });
  zoneTitle.textContent=`配達順（${currentZone||"-"}）`;
}

function switchPage(p){
  deliveryPage.classList.toggle("hidden",p!=="delivery");
  masterPage.classList.toggle("hidden",p!=="master");
  document.querySelectorAll(".top-tab").forEach((t,i)=>{
    t.classList.toggle("active",(p==="delivery"&&i===0)||(p==="master"&&i===1));
  });
}

updateZones();
renderMaster();
render();

</script>

</body>
</html>
