<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>配達ソート</title>

<style>
body {
  margin: 0;
  font-family: -apple-system;
  background: #f2f2f7;
}

.container {
  padding: 12px;
}

.tabs {
  display: flex;
  overflow-x: auto;
  margin-bottom: 10px;
}

.tab {
  padding: 10px 14px;
  background: #ddd;
  border-radius: 10px;
  margin-right: 6px;
}

.tab.active {
  background: #007aff;
  color: white;
}

.card {
  background: white;
  border-radius: 14px;
  padding: 10px;
  margin-bottom: 10px;
}

input, textarea {
  width: 100%;
  padding: 12px;
  font-size: 16px;
  border: none;
}

textarea {
  height: 100px;
  resize: none;
}

.suggest div {
  padding: 12px;
  border-bottom: 1px solid #eee;
}

.list-item {
  padding: 10px;
  border-bottom: 1px solid #eee;
}

button {
  width: 100%;
  padding: 14px;
  border: none;
  border-radius: 10px;
  background: #007aff;
  color: white;
  margin-top: 6px;
}
</style>
</head>

<body>

<div class="container">

<h3>📦 配達ソート</h3>

<div id="tabs" class="tabs"></div>

<div class="card">
  <input id="search" placeholder="住所検索（ひらがなOK）">
  <div id="suggest"></div>
</div>

<div class="card">
  <div id="zoneTitle">配達順</div>
  <div id="result"></div>
</div>

<div class="card">
  <div>📂 CSVファイル</div>
  <input type="file" id="csvFile" accept=".csv">
  <button onclick="importCSVFile()">ファイル読み込み</button>
</div>

<div class="card">
  <div>✏️ CSVテキスト</div>
  <textarea id="csvText" placeholder="ここにCSVを貼り付け"></textarea>
  <button onclick="importCSVText()">テキスト読み込み</button>
</div>

<button onclick="clearList()">リセット</button>

</div>

<script>

// ===== 状態 =====
let master = [];
let zones = [];
let currentZone = "";
let selected = JSON.parse(localStorage.getItem("list") || "{}");

// ===== DOM =====
const tabs = document.getElementById("tabs");
const search = document.getElementById("search");
const suggest = document.getElementById("suggest");
const result = document.getElementById("result");
const zoneTitle = document.getElementById("zoneTitle");

// ===== ひらがな変換 =====
const hiraMap = {"にし":"西","ひがし":"東","みなみ":"南","きた":"北"};

function normalize(t){
  Object.keys(hiraMap).forEach(k=>{
    if(t.includes(k)) t = t.replace(k,hiraMap[k]);
  });
  return t;
}

// ===== 共通CSVパース =====
function parseCSV(text){
  const lines = text.trim().split("\n").slice(1);

  master = lines.map(l=>{
    const [zone,address,order] = l.split(",");
    return {
      zone: zone?.trim(),
      address: address?.trim(),
      order: Number(order)
    };
  }).filter(x=>x.address);

  zones = [...new Set(master.map(m=>m.zone))];
  currentZone = zones[0];

  initTabs();
  render();

  alert(`読み込み完了：${master.length}件`);
}

// ===== ファイル =====
function importCSVFile(){
  const file = document.getElementById("csvFile").files[0];
  if(!file) return alert("ファイル選択して");

  const reader = new FileReader();
  reader.onload = e => parseCSV(e.target.result);
  reader.readAsText(file);
}

// ===== テキスト =====
function importCSVText(){
  const text = document.getElementById("csvText").value;
  if(!text) return alert("テキスト入れて");

  parseCSV(text);
}

// ===== タブ =====
function initTabs(){
  tabs.innerHTML="";

  zones.forEach(z=>{
    const div=document.createElement("div");
    div.className="tab";
    div.textContent=z;

    div.onclick=()=>{
      currentZone=z;
      renderTabs();
      render();
    };

    tabs.appendChild(div);
  });

  renderTabs();
}

function renderTabs(){
  [...tabs.children].forEach(tab=>{
    tab.classList.toggle("active", tab.textContent===currentZone);
  });
}

// ===== サジェスト =====
search.addEventListener("input", ()=>{
  const val = normalize(search.value);
  suggest.innerHTML="";

  if(!val) return;

  master
    .filter(m=>m.zone===currentZone && m.address.includes(val))
    .slice(0,10)
    .forEach(item=>{
      const div=document.createElement("div");
      div.textContent=item.address;
      div.onclick=()=>addItem(item);
      suggest.appendChild(div);
    });
});

// ===== 追加 =====
function addItem(item){
  if(!selected[currentZone]) selected[currentZone]=[];

  if(selected[currentZone].find(s=>s.address===item.address)) return;

  selected[currentZone].push(item);
  selected[currentZone].sort((a,b)=>a.order-b.order);

  save();
  render();

  search.value="";
  suggest.innerHTML="";
}

// ===== 表示 =====
function render(){
  result.innerHTML="";

  const list = selected[currentZone] || [];

  list.forEach((item,i)=>{
    const div=document.createElement("div");
    div.className="list-item";
    div.textContent=`${i+1}. ${item.address}`;
    result.appendChild(div);
  });

  zoneTitle.textContent = `配達順（${currentZone || "-" }）`;
}

// ===== 保存 =====
function save(){
  localStorage.setItem("list",JSON.stringify(selected));
}

// ===== リセット =====
function clearList(){
  selected={};
  save();
  render();
}

render();

</script>

</body>
</html>
