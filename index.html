<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>配達ソート</title>

<style>
body {
  font-family: -apple-system, sans-serif;
  margin: 0;
  padding: 10px;
  background: #f6f6f6;
  color: #111;
}

/* 全体をカード風 */
section {
  background: #fff;
  padding: 10px;
  margin-bottom: 10px;
  border-radius: 10px;
}

/* ボタン大きく（現場用） */
button {
  width: 100%;
  font-size: 18px;
  padding: 14px;
  margin-top: 6px;
  border: none;
  border-radius: 8px;
  background: #007aff;
  color: #fff;
}

/* 入力 */
textarea, input {
  width: 100%;
  font-size: 16px;
  padding: 10px;
  box-sizing: border-box;
  border-radius: 8px;
  border: 1px solid #ccc;
}

/* カメラ */
video {
  width: 100%;
  height: 35vh;
  object-fit: cover;
  border-radius: 10px;
  background: #000;
}

/* 候補・リスト */
.item {
  padding: 10px;
  margin-top: 6px;
  border-radius: 8px;
  background: #f1f1f1;
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-size: 15px;
}

.small-btn {
  width: auto;
  padding: 8px 10px;
  font-size: 14px;
  background: #ff3b30;
}

/* 見出し */
h2 {
  font-size: 18px;
  margin: 5px 0;
}

h3 {
  font-size: 14px;
  margin: 5px 0;
  color: #666;
}
</style>
</head>

<body>

<section>
<h2>📦 配達ソート</h2>
</section>

<section>
<h3>マスタ</h3>
<textarea id="csvInput"></textarea>
<button onclick="loadCSV()">マスタ読込</button>
</section>

<section>
<h3>カメラ</h3>
<video id="video" autoplay playsinline></video>
<button onclick="capture()">📸 読み取り</button>
</section>

<section>
<h3>入力</h3>
<input id="addressInput" placeholder="住所">
<button onclick="addManual()">追加</button>
</section>

<section>
<h3>候補</h3>
<div id="candidates"></div>
</section>

<section>
<h3>配達リスト</h3>
<div id="list"></div>
</section>

<script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>

<script>

let master = [];
let results = [];

/* 初期マスタ */
const defaultMaster = `
1,東京都新宿区西新宿1-1-1
2,東京都渋谷区渋谷2-2-2
3,東京都港区六本木3-3-3
4,東京都千代田区丸の内1-4-1
5,東京都中央区銀座5-5-5
6,東京都品川区大崎1-6-1
7,東京都目黒区青葉台1-1-1
8,東京都世田谷区三軒茶屋2-10-1
9,東京都豊島区南池袋1-28-2
10,東京都台東区上野4-10-5
11,東京都千代田区大手町二丁目3番1号
`.trim();

document.getElementById("csvInput").value = defaultMaster;
loadCSV();

/* カメラ */
navigator.mediaDevices.getUserMedia({
  video: { facingMode: { exact: "environment" } }
}).then(s => {
  document.getElementById("video").srcObject = s;
}).catch(() => {
  navigator.mediaDevices.getUserMedia({ video: true })
  .then(s => document.getElementById("video").srcObject = s);
});

/* マスタ */
function loadCSV() {
  const text = document.getElementById("csvInput").value;

  master = text.split("\n").map(l => {
    const [order, address] = l.split(",");
    return {
      order: parseInt(order),
      address,
      key: normalize(address)
    };
  });

  alert("OK");
}

/* OCR */
async function capture() {
  const v = document.getElementById("video");

  const canvas = document.createElement("canvas");
  const ctx = canvas.getContext("2d");

  canvas.width = v.videoWidth * 1.5;
  canvas.height = v.videoHeight * 1.5;

  ctx.filter = "contrast(2) brightness(1.2)";

  ctx.drawImage(
    v,
    v.videoWidth * 0.1,
    v.videoHeight * 0.2,
    v.videoWidth * 0.8,
    v.videoHeight * 0.4,
    0,0,
    canvas.width,
    canvas.height
  );

  const { data:{ text } } = await Tesseract.recognize(canvas,"jpn");

  const addr = extract(text);
  if(!addr) return;

  const clean = normalize(addr);
  document.getElementById("addressInput").value = clean;

  showCandidates(clean);
}

/* 候補 */
function showCandidates(text){
  const list = master
    .map(m=>({...m,score:similarity(text,m.address)}))
    .sort((a,b)=>b.score-a.score)
    .slice(0,3);

  document.getElementById("candidates").innerHTML =
    list.map(c=>`
      <div class="item">
        <div>${c.order}. ${c.address}</div>
        <button onclick="select(${c.order})">追加</button>
      </div>
    `).join("");
}

function select(order){
  const m = master.find(x=>x.order===order);
  if(!m) return;

  if(!results.find(r=>r.order===order)){
    results.push(m);
    update();
  }

  document.getElementById("candidates").innerHTML="";
}

/* 手動 */
function addManual(){
  const v = document.getElementById("addressInput").value;
  const m = master.find(x=>v.includes(x.address));

  if(m && !results.find(r=>r.order===m.order)){
    results.push(m);
    update();
  }

  document.getElementById("addressInput").value="";
}

/* 削除 */
function remove(order){
  results = results.filter(r=>r.order!==order);
  update();
}

/* 表示 */
function update(){
  results.sort((a,b)=>a.order-b.order);

  document.getElementById("list").innerHTML =
    results.map(r=>`
      <div class="item">
        <div>${r.order}. ${r.address}</div>
        <button class="small-btn" onclick="remove(${r.order})">削除</button>
      </div>
    `).join("");
}

/* OCR補助 */
function extract(t){
  return t.split("\n").find(l=>
    (l.includes("区")||l.includes("市")) && /\d/.test(l)
  );
}

function normalize(a){
  return a
    .replace(/[ー－−]/g,"-")
    .replace(/丁目/g,"-")
    .replace(/番地/g,"-")
    .replace(/\s/g,"");
}

function similarity(a,b){
  let m=0;
  for(let i=0;i<Math.min(a.length,b.length);i++){
    if(a[i]===b[i])m++;
  }
  return m/Math.max(a.length,b.length);
}

</script>

</body>
</html>
