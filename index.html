<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>配達ソート</title>

<style>
body { font-family:-apple-system; background:#f6f6f6; padding:10px; }
section { background:#fff; padding:10px; margin-bottom:10px; border-radius:10px; }

video, canvas.preview {
  width:100%; height:35vh; object-fit:cover;
  border-radius:10px; background:#000;
}

button {
  width:100%; padding:14px; margin-top:6px;
  font-size:18px; border:none; border-radius:8px;
  background:#007aff; color:#fff;
}

.item {
  background:#eee; margin-top:6px; padding:10px;
  border-radius:8px; display:flex; justify-content:space-between;
}

.small-btn { background:#ff3b30; width:auto; padding:6px 10px; }

textarea, input {
  width:100%; padding:10px; margin-top:6px;
  border-radius:8px; border:1px solid #ccc;
}

#status {
  position:fixed; bottom:20px; left:50%;
  transform:translateX(-50%);
  background:#111; color:#fff;
  padding:10px 16px; border-radius:20px;
  opacity:0; transition:.3s;
}
</style>
</head>

<body>

<section>
<h2>📦 配達ソート</h2>
<div id="nextHint"></div>
</section>

<section>
<h3>マスタ</h3>
<textarea id="csvInput"></textarea>
<button onclick="loadCSV()">マスタ読込</button>
</section>

<section>
<h3>カメラ</h3>
<video id="video" autoplay playsinline></video>
<canvas id="freeze" class="preview" style="display:none;"></canvas>

<button onclick="startCamera()">📷 カメラ起動</button>
<button id="scanBtn" onclick="capture()">📸 読み取り</button>
<button onclick="resumeCamera()">▶ 戻す</button>
</section>

<section>
<h3>入力</h3>
<input id="addressInput">
<button onclick="addManual()">追加</button>
</section>

<section>
<h3>候補</h3>
<div id="candidates"></div>
</section>

<section>
<h3>配達リスト</h3>
<div id="list"></div>
</section>

<div id="status"></div>

<script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>

<script>
let master=[], results=[], stream=null, scanning=false;

const defaultMaster=`
1,東京都新宿区西新宿1-1-1
2,東京都渋谷区渋谷2-2-2
3,東京都港区六本木3-3-3
`.trim();

csvInput.value=defaultMaster;
loadCSV();

/* ステータス */
function showStatus(t){
  status.innerText=t;
  status.style.opacity=1;
  setTimeout(()=>status.style.opacity=0,2000);
}

/* カメラ */
function startCamera(){
  navigator.mediaDevices.getUserMedia({video:{facingMode:"environment"}})
  .then(s=>{
    stream=s;
    video.srcObject=s;
    showStatus("カメラON");
  })
  .catch(()=>showStatus("カメラ許可して"));
}

/* OCR（タイムアウト付き） */
async function capture(){
  if(!stream){ showStatus("カメラ起動して"); return; }
  if(scanning) return;
  scanning=true;

  scanBtn.innerText="読み取り中…";
  scanBtn.disabled=true;

  const canvas=freeze;
  const ctx=canvas.getContext("2d");

  // 🔥 軽量化（重要）
  canvas.width=video.videoWidth*0.8;
  canvas.height=video.videoHeight*0.3;

  ctx.drawImage(
    video,
    video.videoWidth*0.1,
    video.videoHeight*0.3,
    video.videoWidth*0.8,
    video.videoHeight*0.3,
    0,0,canvas.width,canvas.height
  );

  video.style.display="none";
  canvas.style.display="block";

  showStatus("解析中…");

  try{
    const result = await Promise.race([
      Tesseract.recognize(canvas,"jpn"),
      new Promise((_,reject)=>
        setTimeout(()=>reject("timeout"),10000)
      )
    ]);

    if(result==="timeout"){
      showStatus("遅すぎ（失敗）");
      finish();
      return;
    }

    const text=result.data.text;
    const addr=extract(text);

    if(!addr){
      showStatus("読めない");
      finish();
      return;
    }

    const clean=normalize(addr);
    addressInput.value=clean;

    showStatus("OK");
    showCandidates(clean);

  }catch{
    showStatus("OCR失敗");
  }

  finish();
}

function finish(){
  scanBtn.innerText="📸 読み取り";
  scanBtn.disabled=false;
  scanning=false;
}

/* 戻す */
function resumeCamera(){
  video.style.display="block";
  freeze.style.display="none";
}

/* マスタ */
function loadCSV(){
  master=csvInput.value.split("\n").map(l=>{
    const [o,a]=l.split(",");
    return {order:+o,address:a,key:normalize(a)};
  });
}

/* 正規化 */
function normalize(a){
  return a.replace(/[０-９]/g,s=>String.fromCharCode(s.charCodeAt(0)-65248))
    .replace(/丁目|番|号/g,"-")
    .replace(/東京都|.+?区|.+?市/g,"")
    .replace(/\s/g,"");
}

/* 抽出 */
function extract(t){
  return t.split("\n").find(l=>/\d/.test(l));
}

/* 候補 */
function showCandidates(t){
  const list=master
    .map(m=>({...m,score:score(t,m.key)}))
    .sort((a,b)=>b.score-a.score)
    .slice(0,3);

  candidates.innerHTML=list.map(c=>`
    <div class="item">${c.address}</div>
  `).join("");
}

function score(a,b){
  const na=a.match(/\d+/g)||[];
  const nb=b.match(/\d+/g)||[];
  return na.filter(n=>nb.includes(n)).length;
}
</script>

</body>
</html>
