<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>配達ソート</title>

<style>
body {
  font-family: -apple-system, sans-serif;
  margin: 0;
  padding: 10px;
  background: #f6f6f6;
  color: #111;
}

section {
  background: #fff;
  padding: 10px;
  margin-bottom: 10px;
  border-radius: 10px;
}

button {
  width: 100%;
  font-size: 18px;
  padding: 14px;
  margin-top: 6px;
  border: none;
  border-radius: 8px;
  background: #007aff;
  color: #fff;
}

button:disabled {
  opacity: 0.6;
}

textarea, input {
  width: 100%;
  font-size: 16px;
  padding: 10px;
  box-sizing: border-box;
  border-radius: 8px;
  border: 1px solid #ccc;
}

video {
  width: 100%;
  height: 35vh;
  object-fit: cover;
  border-radius: 10px;
  background: #000;
}

.item {
  padding: 10px;
  margin-top: 6px;
  border-radius: 8px;
  background: #f1f1f1;
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-size: 15px;
}

.small-btn {
  width: auto;
  padding: 8px 10px;
  font-size: 14px;
  background: #ff3b30;
}

h2 { font-size: 18px; margin: 5px 0; }
h3 { font-size: 14px; margin: 5px 0; color: #666; }

.ghost {
  font-size: 13px;
  color: #999;
  margin-top: 4px;
}

/* ステータス表示 */
#status {
  position: fixed;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  background: #111;
  color: #fff;
  padding: 10px 16px;
  border-radius: 20px;
  font-size: 14px;
  opacity: 0;
  transition: 0.3s;
}
</style>
</head>

<body>

<section>
<h2>📦 配達ソート</h2>
<div class="ghost" id="nextHint"></div>
</section>

<section>
<h3>マスタ</h3>
<textarea id="csvInput"></textarea>
<button onclick="loadCSV()">マスタ読込</button>
</section>

<section>
<h3>カメラ</h3>
<video id="video" autoplay playsinline></video>
<button id="scanBtn" onclick="capture()">📸 読み取り</button>
</section>

<section>
<h3>入力</h3>
<input id="addressInput" placeholder="住所">
<button onclick="addManual()">追加</button>
</section>

<section>
<h3>候補</h3>
<div id="candidates"></div>
</section>

<section>
<h3>配達リスト</h3>
<div id="list"></div>
</section>

<div id="status"></div>

<script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>

<script>
let master = [];
let results = [];
let scanning = false;

const defaultMaster = `
1,東京都新宿区西新宿1-1-1
2,東京都渋谷区渋谷2-2-2
3,東京都港区六本木3-3-3
4,東京都千代田区丸の内1-4-1
5,東京都中央区銀座5-5-5
6,東京都品川区大崎1-6-1
7,東京都目黒区青葉台1-1-1
8,東京都世田谷区三軒茶屋2-10-1
9,東京都豊島区南池袋1-28-2
10,東京都台東区上野4-10-5
11,東京都千代田区大手町二丁目3番1号
`.trim();

csvInput.value = defaultMaster;
loadCSV();

/* カメラ */
navigator.mediaDevices.getUserMedia({
  video: { facingMode: { ideal: "environment" } }
}).then(s => video.srcObject = s);

/* ステータス表示 */
function showStatus(text,type="normal"){
  const el = status;
  el.innerText = text;

  if(type==="error") el.style.background="#ff3b30";
  else if(type==="ok") el.style.background="#34c759";
  else el.style.background="#111";

  el.style.opacity = 1;
  setTimeout(()=>el.style.opacity=0,1500);
}

/* マスタ */
function loadCSV(){
  master = csvInput.value.split("\n").map(l=>{
    const [order,address] = l.split(",");
    return {
      order: parseInt(order),
      address,
      key: normalize(address)
    };
  });

  localStorage.setItem("master", JSON.stringify(master));
  showStatus("マスタ読込OK","ok");
}

/* OCR */
async function capture(){
  if(scanning) return;
  scanning = true;

  const btn = scanBtn;
  btn.innerText = "読み取り中…";
  btn.disabled = true;

  showStatus("読み取り中…");

  try{
    const canvas = document.createElement("canvas");
    const ctx = canvas.getContext("2d");

    canvas.width = video.videoWidth * 1.5;
    canvas.height = video.videoHeight * 1.5;

    ctx.filter = "contrast(2) brightness(1.2)";
    ctx.drawImage(video,
      video.videoWidth*0.1,
      video.videoHeight*0.2,
      video.videoWidth*0.8,
      video.videoHeight*0.4,
      0,0,canvas.width,canvas.height
    );

    const { data:{ text } } = await Tesseract.recognize(canvas,"jpn",{
      tessedit_char_whitelist:"0123456789-丁目番号東京都区市町村"
    });

    const addr = extract(text);

    if(!addr){
      showStatus("読めなかった","error");
      scanning=false;
      resetBtn();
      return;
    }

    const clean = normalize(addr);
    addressInput.value = clean;

    navigator.vibrate?.(50);
    showStatus("OK","ok");

    showCandidates(clean);

  }catch(e){
    showStatus("エラー","error");
  }

  scanning=false;
  resetBtn();
}

function resetBtn(){
  scanBtn.innerText="📸 読み取り";
  scanBtn.disabled=false;
}

/* 正規化 */
function normalize(addr){
  return addr
    .replace(/[０-９]/g,s=>String.fromCharCode(s.charCodeAt(0)-65248))
    .replace(/[ー－−―]/g,"-")
    .replace(/丁目|番地|番|号/g,"-")
    .replace(/東京都|.+?区|.+?市/g,"")
    .replace(/-+/g,"-")
    .replace(/\s/g,"")
    .replace(/^-|-$/g,"");
}

/* マッチング */
function matchScore(input,master){
  if(input===master) return 100;

  let score=0;
  const a=input.match(/\d+/g)||[];
  const b=master.match(/\d+/g)||[];

  score+=a.filter(n=>b.includes(n)).length*10;
  if(master.includes(input)) score+=20;
  if(input.includes(master)) score+=20;

  return score;
}

/* 候補 */
function showCandidates(text){
  const list = master
    .map(m=>({...m,score:matchScore(text,m.key)}))
    .sort((a,b)=>b.score-a.score)
    .slice(0,3);

  candidates.innerHTML=list.map(c=>`
    <div class="item">
      <div>${c.order}. ${c.address}</div>
      <button onclick="select(${c.order})">追加</button>
    </div>
  `).join("");
}

function select(order){
  const m=master.find(x=>x.order===order);
  if(!results.find(r=>r.order===order)){
    results.push(m);
    update();
  }
  candidates.innerHTML="";
}

/* 手動 */
function addManual(){
  const clean=normalize(addressInput.value);

  const m=master
    .map(m=>({...m,score:matchScore(clean,m.key)}))
    .sort((a,b)=>b.score-a.score)[0];

  if(m && !results.find(r=>r.order===m.order)){
    results.push(m);
    update();
  }

  addressInput.value="";
}

/* 削除 */
function remove(order){
  results=results.filter(r=>r.order!==order);
  update();
}

/* 更新 */
function update(){
  results.sort((a,b)=>a.order-b.order);

  list.innerHTML=results.map(r=>`
    <div class="item">
      <div>${r.order}. ${r.address}</div>
      <button class="small-btn" onclick="remove(${r.order})">削除</button>
    </div>
  `).join("");

  updateNext();
}

/* ゴースト */
function updateNext(){
  const remaining=master.filter(m=>!results.find(r=>r.order===m.order));
  nextHint.innerText=remaining.length
    ? "次: "+remaining.sort((a,b)=>a.order-b.order)[0].address
    : "完了 🎉";
}

/* OCR補助 */
function extract(t){
  return t.split("\n").find(l=>
    (l.includes("区")||l.includes("市")) && /\d/.test(l)
  );
}
</script>
</body>
</html>
