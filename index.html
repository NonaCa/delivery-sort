<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>配達ソート（サジェスト版）</title>
<style>
body {
  font-family: sans-serif;
  margin: 0;
  padding: 16px;
  background: #f5f5f5;
}

h1 {
  font-size: 20px;
}

input {
  width: 100%;
  padding: 12px;
  font-size: 16px;
  margin-bottom: 8px;
}

.suggest {
  background: white;
  border: 1px solid #ccc;
  max-height: 150px;
  overflow-y: auto;
}

.suggest div {
  padding: 10px;
  border-bottom: 1px solid #eee;
  cursor: pointer;
}

.suggest div:hover {
  background: #f0f0f0;
}

.list {
  margin-top: 20px;
  background: white;
  padding: 10px;
}

.item {
  padding: 8px;
  border-bottom: 1px solid #eee;
}

button {
  margin-top: 10px;
  padding: 10px;
  width: 100%;
  font-size: 16px;
}
</style>
</head>

<body>

<h1>📦 配達ソート</h1>

<input id="search" placeholder="住所を入力..." />

<div id="suggest" class="suggest"></div>

<div class="list">
  <h3>配達順</h3>
  <div id="result"></div>
</div>

<button onclick="clearList()">リセット</button>

<script>
// ===== マスタデータ =====
const master = [
  { address: "西新宿1-1-1", order: 2 },
  { address: "渋谷2-2-2", order: 1 },
  { address: "六本木3-3-3", order: 3 },
  { address: "池袋4-4-4", order: 4 },
];

// ===== 状態 =====
let selected = JSON.parse(localStorage.getItem("list") || "[]");

// ===== DOM =====
const search = document.getElementById("search");
const suggest = document.getElementById("suggest");
const result = document.getElementById("result");

// ===== サジェスト =====
search.addEventListener("input", () => {
  const val = search.value;
  suggest.innerHTML = "";

  if (!val) return;

  const filtered = master.filter(m =>
    m.address.includes(val)
  );

  filtered.forEach(item => {
    const div = document.createElement("div");
    div.textContent = item.address;

    div.onclick = () => addItem(item);

    suggest.appendChild(div);
  });
});

// ===== 追加 =====
function addItem(item) {
  // 重複防止
  if (selected.find(s => s.address === item.address)) return;

  selected.push(item);

  // 並び替え
  selected.sort((a, b) => a.order - b.order);

  save();
  render();

  search.value = "";
  suggest.innerHTML = "";
}

// ===== 表示 =====
function render() {
  result.innerHTML = "";

  selected.forEach((item, index) => {
    const div = document.createElement("div");
    div.className = "item";
    div.textContent = `${index + 1}️⃣ ${item.address}`;
    result.appendChild(div);
  });
}

// ===== 保存 =====
function save() {
  localStorage.setItem("list", JSON.stringify(selected));
}

// ===== リセット =====
function clearList() {
  selected = [];
  save();
  render();
}

// 初期表示
render();
</script>

</body>
</html>
