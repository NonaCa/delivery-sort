<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>配達ソート</title>

<style>
body { font-family: sans-serif; padding: 10px; }

button {
  font-size: 16px;
  padding: 10px;
  margin: 5px 0;
}

textarea, input {
  width: 100%;
  font-size: 16px;
  padding: 8px;
}

video {
  width: 100%;
  height: 40vh;
  object-fit: cover;
  background: #000;
  border-radius: 8px;
}

#frame {
  position: absolute;
  top: 20%;
  left: 10%;
  width: 80%;
  height: 40%;
  border: 2px solid red;
  pointer-events: none;
}

.result { margin-top: 10px; font-weight: bold; }

.list div {
  margin: 5px 0;
  padding: 5px;
  border-bottom: 1px solid #ddd;
}
</style>
</head>

<body>

<h2>配達ソート</h2>

<h3>① マスタCSV（編集可）</h3>
<textarea id="csvInput"></textarea>
<button onclick="loadCSV()">マスタ再読込</button>

<h3>② カメラ</h3>

<div style="position:relative;">
<video id="video" autoplay playsinline></video>
<div id="frame"></div>
</div>

<button onclick="capture()">📸 撮影</button>

<h3>③ 入力</h3>
<input id="addressInput" placeholder="住所入力">
<button onclick="addManual()">➕ 追加</button>

<div class="result" id="result"></div>

<h3>④ 候補</h3>
<div id="candidates"></div>

<h3>⑤ 配達リスト</h3>
<div id="list"></div>

<script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>

<script>

let master = [];
let results = [];

/* -----------------------
   🔥 初期マスタ（10件）
------------------------*/
const defaultMaster = `
1,東京都新宿区西新宿1-1-1
2,東京都渋谷区渋谷2-2-2
3,東京都港区六本木3-3-3
4,東京都千代田区丸の内1-4-1
5,東京都中央区銀座5-5-5
6,東京都品川区大崎1-6-1
7,東京都目黒区青葉台1-1-1
8,東京都世田谷区三軒茶屋2-10-1
9,東京都豊島区南池袋1-28-2
10,東京都台東区上野4-10-5
11,東京都千代田区大手町二丁目3番1号
`.trim();

// 初期表示
document.getElementById("csvInput").value = defaultMaster;
loadCSV();

/* -----------------------
   カメラ起動
------------------------*/
navigator.mediaDevices.getUserMedia({
  video: { facingMode: { exact: "environment" } }
}).then(s => {
  document.getElementById("video").srcObject = s;
}).catch(() => {
  navigator.mediaDevices.getUserMedia({ video: true })
  .then(s => {
    document.getElementById("video").srcObject = s;
  });
});

/* -----------------------
   マスタ読込
------------------------*/
function loadCSV() {
  const text = document.getElementById("csvInput").value;

  master = text.split("\n").map(line => {
    const [order, address] = line.split(",");
    return {
      order: parseInt(order),
      address,
      key: normalize(address)
    };
  });

  alert("マスタ更新完了");
}

/* -----------------------
   OCR
------------------------*/
async function capture() {
  const video = document.getElementById("video");

  const canvas = document.createElement("canvas");
  const ctx = canvas.getContext("2d");

  canvas.width = video.videoWidth * 1.5;
  canvas.height = video.videoHeight * 1.5;

  ctx.filter = "contrast(2) brightness(1.2)";

  ctx.drawImage(
    video,
    video.videoWidth * 0.1,
    video.videoHeight * 0.2,
    video.videoWidth * 0.8,
    video.videoHeight * 0.4,
    0, 0,
    canvas.width,
    canvas.height
  );

  document.getElementById("result").innerText = "読み取り中...";

  const { data: { text } } = await Tesseract.recognize(canvas, "jpn");

  const addr = extractAddress(text);

  if (!addr) {
    document.getElementById("result").innerText = "失敗";
    return;
  }

  const clean = normalize(addr);

  document.getElementById("addressInput").value = clean;

  showCandidates(clean);
}

/* -----------------------
   候補
------------------------*/
function showCandidates(text) {
  const candidates = master
    .map(m => ({
      ...m,
      score: similarity(text, m.address)
    }))
    .sort((a,b)=>b.score-a.score)
    .slice(0,3);

  document.getElementById("candidates").innerHTML =
    candidates.map(c => `
      <div>
        ${c.order}. ${c.address}
        <button onclick="selectCandidate(${c.order})">追加</button>
      </div>
    `).join("");
}

function selectCandidate(order) {
  const m = master.find(x => x.order === order);
  if (!m) return;

  if (!results.find(r => r.order === order)) {
    results.push(m);
    updateList();
  }

  document.getElementById("result").innerText = "追加: " + m.address;
  document.getElementById("candidates").innerHTML = "";
}

/* -----------------------
   手動追加
------------------------*/
function addManual() {
  const val = document.getElementById("addressInput").value;
  const m = master.find(x => val.includes(x.address));

  if (m) {
    if (!results.find(r => r.order === m.order)) {
      results.push(m);
      updateList();
    }
  }

  document.getElementById("addressInput").value = "";
}

/* -----------------------
   削除
------------------------*/
function removeItem(order) {
  results = results.filter(r => r.order !== order);
  updateList();
}

/* -----------------------
   リスト更新
------------------------*/
function updateList() {
  const sorted = results.sort((a,b)=>a.order-b.order);

  document.getElementById("list").innerHTML =
    sorted.map(m =>
      `<div>${m.order}. ${m.address}
      <button onclick="removeItem(${m.order})">削除</button></div>`
    ).join("");
}

/* -----------------------
   OCR補助
------------------------*/
function extractAddress(text) {
  return text.split("\n").find(l =>
    (l.includes("区")||l.includes("市")) && /\d/.test(l)
  );
}

function normalize(a){
  return a
    .replace(/[ー－−]/g,"-")
    .replace(/丁目/g,"-")
    .replace(/番地/g,"-")
    .replace(/\s/g,"");
}

function similarity(a,b){
  let m=0;
  for(let i=0;i<Math.min(a.length,b.length);i++){
    if(a[i]===b[i])m++;
  }
  return m/Math.max(a.length,b.length);
}

</script>

</body>
</html>
