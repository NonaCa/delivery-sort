<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>配達ソート</title>

<style>
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont;
  background: #f2f2f7;
}

.container {
  padding: 16px;
}

h1 {
  font-size: 20px;
  margin-bottom: 10px;
}

.card {
  background: white;
  border-radius: 14px;
  padding: 12px;
  margin-bottom: 12px;
  box-shadow: 0 2px 6px rgba(0,0,0,0.05);
}

input {
  width: 100%;
  padding: 14px;
  font-size: 18px;
  border: none;
  outline: none;
}

.suggest {
  max-height: 200px;
  overflow-y: auto;
}

.suggest div {
  padding: 14px;
  border-bottom: 1px solid #eee;
  font-size: 16px;
}

.suggest div:active {
  background: #e5e5ea;
}

.list-item {
  padding: 12px;
  border-bottom: 1px solid #eee;
  font-size: 16px;
}

.footer {
  position: fixed;
  bottom: 0;
  width: 100%;
  background: white;
  padding: 10px;
  box-shadow: 0 -2px 6px rgba(0,0,0,0.05);
}

button {
  width: 100%;
  padding: 14px;
  font-size: 16px;
  border: none;
  border-radius: 10px;
  background: #007aff;
  color: white;
}
</style>
</head>

<body>

<div class="container">

<h1>📦 配達ソート</h1>

<div class="card">
  <input id="search" placeholder="住所を入力（ひらがなOK）">
  <div id="suggest" class="suggest"></div>
</div>

<div class="card">
  <div>配達順（<span id="count">0</span>件）</div>
  <div id="result"></div>
</div>

</div>

<div class="footer">
  <button onclick="clearList()">リセット</button>
</div>

<script>

// ===== ひらがな簡易辞書 =====
const hiraMap = {
  "にし": "西",
  "ひがし": "東",
  "みなみ": "南",
  "きた": "北",
  "じょう": "城",
  "ほん": "本",
  "た": "田",
};

// ===== マスタ生成（100件）=====
const towns = ["東町","西町","南町","北町","城南町","本町","田主丸町","御井町","合川町","荒木町"];

let master = [];
let id = 1;

towns.forEach((town, i) => {
  for (let j = 1; j <= 10; j++) {
    master.push({
      address: `久留米市${town}${j}-${j}-${j}`,
      order: id++
    });
  }
});

// ===== 状態 =====
let selected = JSON.parse(localStorage.getItem("list") || "[]");

// ===== DOM =====
const search = document.getElementById("search");
const suggest = document.getElementById("suggest");
const result = document.getElementById("result");
const count = document.getElementById("count");

// ===== 正規化 =====
function normalize(text) {
  let t = text;
  Object.keys(hiraMap).forEach(k => {
    if (t.includes(k)) t = t.replace(k, hiraMap[k]);
  });
  return t;
}

// ===== サジェスト =====
search.addEventListener("input", () => {
  const val = normalize(search.value);
  suggest.innerHTML = "";

  if (!val) return;

  const filtered = master.filter(m =>
    m.address.includes(val)
  ).slice(0, 10);

  filtered.forEach(item => {
    const div = document.createElement("div");
    div.textContent = item.address;

    div.onclick = () => addItem(item);

    suggest.appendChild(div);
  });
});

// ===== 追加 =====
function addItem(item) {
  if (selected.find(s => s.address === item.address)) return;

  selected.push(item);
  selected.sort((a, b) => a.order - b.order);

  save();
  render();

  search.value = "";
  suggest.innerHTML = "";

  // 軽いフィードバック
  navigator.vibrate?.(30);
}

// ===== 表示 =====
function render() {
  result.innerHTML = "";

  selected.forEach((item, i) => {
    const div = document.createElement("div");
    div.className = "list-item";
    div.textContent = `${i+1}. ${item.address}`;
    result.appendChild(div);
  });

  count.textContent = selected.length;
}

// ===== 保存 =====
function save() {
  localStorage.setItem("list", JSON.stringify(selected));
}

// ===== リセット =====
function clearList() {
  selected = [];
  save();
  render();
}

// 初期表示
render();

</script>

</body>
</html>
