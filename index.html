<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>配達ソート</title>

<style>
body { margin:0; font-family:-apple-system; background:#f2f2f7;}
.container { padding:12px;}

.top-tabs { display:flex;}
.top-tab { flex:1; padding:12px; text-align:center; background:#ddd;}
.top-tab.active { background:#007aff;color:#fff;}

.hidden{display:none;}

.tabs{display:flex;overflow-x:auto;margin:8px 0;}
.tab{padding:8px 12px;background:#ddd;border-radius:10px;margin-right:6px;}
.tab.active{background:#007aff;color:#fff;}

.card{background:#fff;border-radius:12px;padding:10px;margin-bottom:10px;}

input,textarea{width:100%;padding:10px;border:none;}
textarea{height:90px;}

.item{
  padding:10px;
  border-bottom:1px solid #eee;
  display:flex;
  justify-content:space-between;
  background:#fff;
}

.dragging{opacity:0.5;}

.zone-block{margin-bottom:10px;}
.zone-title{font-weight:bold;margin-bottom:4px;}

button{width:100%;padding:12px;border:none;border-radius:10px;background:#007aff;color:#fff;margin-top:6px;}
.small-btn{width:auto;background:#ff3b30;padding:6px 10px;font-size:12px;}
</style>
</head>

<body>

<div class="container">

<div class="top-tabs">
  <div class="top-tab active" onclick="switchPage('delivery')">🚚 配達</div>
  <div class="top-tab" onclick="switchPage('master')">🛠️ マスタ作成</div>
</div>

<div id="deliveryPage">
  <div id="tabs" class="tabs"></div>

  <div class="card">
    <input id="search" placeholder="住所検索（かなOK）">
    <div id="suggest"></div>
  </div>

  <div class="card">
    <div id="zoneTitle"></div>
    <div id="result"></div>
  </div>
</div>

<div id="masterPage" class="hidden">

  <div class="card">
    <input id="zoneInput" placeholder="区間">
    <textarea id="addressInput" placeholder="住所（改行）"></textarea>
    <button onclick="addMaster()">追加</button>
  </div>

  <div id="masterList"></div>

</div>

</div>

<script>

// ===== 状態 =====
let master = JSON.parse(localStorage.getItem("master")||"[]");
let selected = JSON.parse(localStorage.getItem("selected")||"{}");
let zones=[];
let currentZone="";
let draggingEl = null;

// ===== 保存 =====
function saveAll(){
  localStorage.setItem("master",JSON.stringify(master));
  localStorage.setItem("selected",JSON.stringify(selected));
}

// ===== ゾーン =====
function updateZones(){
  zones=[...new Set(master.map(m=>m.zone))];
  currentZone=currentZone||zones[0];
  renderTabs();
}

// ===== タブ =====
function renderTabs(){
  const tabs=document.getElementById("tabs");
  tabs.innerHTML="";
  zones.forEach(z=>{
    const d=document.createElement("div");
    d.className="tab";
    d.textContent=z;
    if(z===currentZone)d.classList.add("active");
    d.onclick=()=>{currentZone=z; render(); renderTabs();};
    tabs.appendChild(d);
  });
}

// ===== マスタ表示（修正版D&D）=====
function renderMaster(){
  const box=document.getElementById("masterList");
  box.innerHTML="";

  zones.forEach(z=>{
    const block=document.createElement("div");
    block.className="card zone-block";
    block.dataset.zone = z;

    const title=document.createElement("div");
    title.className="zone-title";
    title.textContent=`区間 ${z}`;
    block.appendChild(title);

    const list=document.createElement("div");

    master.filter(m=>m.zone===z)
      .sort((a,b)=>a.order-b.order)
      .forEach(m=>{

      const div=document.createElement("div");
      div.className="item";
      div.draggable=true;
      div.dataset.zone=z;
      div.dataset.address=m.address;

      div.innerHTML=`${m.address}
        <button class="small-btn" onclick="deleteItem('${z}','${m.address}')">削除</button>`;

      div.addEventListener("dragstart", ()=>{
        draggingEl = div;
        div.classList.add("dragging");
      });

      div.addEventListener("dragend", ()=>{
        div.classList.remove("dragging");
        draggingEl = null;
        reOrder(z);
      });

      div.addEventListener("dragover", e=>{
        e.preventDefault();
        if(!draggingEl || draggingEl===div) return;

        const parent = div.parentNode;
        const rect = div.getBoundingClientRect();
        const offset = e.clientY - rect.top;

        if(offset > rect.height/2){
          parent.insertBefore(draggingEl, div.nextSibling);
        }else{
          parent.insertBefore(draggingEl, div);
        }
      });

      list.appendChild(div);
    });

    block.appendChild(list);
    box.appendChild(block);
  });
}

// ===== 並び再計算 =====
function reOrder(zone){
  const block = document.querySelector(`[data-zone="${zone}"]`);
  if(!block) return;

  const items = [...block.querySelectorAll(".item")];

  items.forEach((el,i)=>{
    const addr = el.dataset.address;
    const target = master.find(m=>m.zone===zone && m.address===addr);
    if(target) target.order = i+1;
  });

  saveAll();
}

// ===== 削除 =====
function deleteItem(z,a){
  master = master.filter(m=>!(m.zone===z && m.address===a));
  updateZones();
  renderMaster();
  saveAll();
}

// ===== 追加 =====
function addMaster(){
  const z=document.getElementById("zoneInput").value;
  const lines=document.getElementById("addressInput").value.split("\n");

  lines.forEach(l=>{
    if(l.trim()){
      master.push({zone:z,address:l.trim(),order:master.length+1});
    }
  });

  updateZones();
  renderMaster();
  saveAll();
}

// ===== 配達 =====
search.addEventListener("input", ()=>{
  const val=search.value;
  suggest.innerHTML="";
  master.filter(m=>m.zone===currentZone && m.address.includes(val))
    .slice(0,10)
    .forEach(item=>{
      const d=document.createElement("div");
      d.textContent=item.address;
      d.onclick=()=>addItem(item);
      suggest.appendChild(d);
    });
});

function addItem(item){
  if(!selected[currentZone]) selected[currentZone]=[];
  selected[currentZone].push(item);
  selected[currentZone].sort((a,b)=>a.order-b.order);
  saveAll();
  render();
}

function render(){
  result.innerHTML="";
  (selected[currentZone]||[]).forEach((m,i)=>{
    const d=document.createElement("div");
    d.textContent=`${i+1}. ${m.address}`;
    result.appendChild(d);
  });
  zoneTitle.textContent=`配達順（${currentZone||"-"}）`;
}

// ===== ページ切替 =====
function switchPage(p){
  deliveryPage.classList.toggle("hidden",p!=="delivery");
  masterPage.classList.toggle("hidden",p!=="master");
  document.querySelectorAll(".top-tab").forEach((t,i)=>{
    t.classList.toggle("active",(p==="delivery"&&i===0)||(p==="master"&&i===1));
  });
}

// 初期化
updateZones();
renderMaster();
render();

</script>

</body>
</html>
