<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>配達ソート</title>

<style>
body { font-family: -apple-system; background:#f6f6f6; padding:10px; }
section { background:#fff; padding:10px; margin-bottom:10px; border-radius:10px; }

video, canvas.preview {
  width:100%;
  height:35vh;
  object-fit:cover;
  border-radius:10px;
  background:#000;
}

button {
  width:100%; padding:14px; margin-top:6px;
  font-size:18px; border:none; border-radius:8px;
  background:#007aff; color:#fff;
}

.item {
  background:#eee; margin-top:6px; padding:10px;
  border-radius:8px; display:flex; justify-content:space-between;
}

#status {
  position:fixed; bottom:20px; left:50%;
  transform:translateX(-50%);
  background:#111; color:#fff;
  padding:10px 16px; border-radius:20px;
  opacity:0; transition:.3s;
}
</style>
</head>

<body>

<section>
<h2>📦 配達ソート</h2>
<div id="nextHint"></div>
</section>

<section>
<video id="video" autoplay playsinline></video>
<canvas id="freeze" class="preview" style="display:none;"></canvas>

<button onclick="startCamera()">📷 カメラ起動</button>
<button onclick="capture()">📸 読み取り</button>
<button onclick="resumeCamera()">▶ カメラ戻す</button>
</section>

<section>
<div id="candidates"></div>
</section>

<div id="status"></div>

<script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>

<script>
let stream=null;
let master=[
  {order:1,address:"西新宿1-1-1",key:"西新宿1-1-1"},
  {order:2,address:"渋谷2-2-2",key:"渋谷2-2-2"},
  {order:3,address:"六本木3-3-3",key:"六本木3-3-3"}
];

function showStatus(t){
  status.innerText=t;
  status.style.opacity=1;
  setTimeout(()=>status.style.opacity=0,1500);
}

/* カメラ */
function startCamera(){
  navigator.mediaDevices.getUserMedia({video:{facingMode:"environment"}})
  .then(s=>{
    stream=s;
    video.srcObject=s;
    showStatus("カメラON");
  })
  .catch(()=>showStatus("カメラ許可して"));
}

/* 静止画取得 */
async function capture(){
  if(!stream){ showStatus("カメラ起動して"); return; }

  const canvas=freeze;
  const ctx=canvas.getContext("2d");

  canvas.width=video.videoWidth;
  canvas.height=video.videoHeight;

  ctx.drawImage(video,0,0);

  video.style.display="none";
  canvas.style.display="block";

  showStatus("この画像を解析中…");

  const {data:{text}}=await Tesseract.recognize(canvas,"jpn");

  const addr = text.split("\n").find(l=>/\d/.test(l));
  if(!addr){
    showStatus("読めない");
    return;
  }

  const clean = normalize(addr);
  showCandidates(clean);
}

/* カメラ戻す */
function resumeCamera(){
  video.style.display="block";
  freeze.style.display="none";
}

/* 正規化 */
function normalize(a){
  return a
    .replace(/[０-９]/g,s=>String.fromCharCode(s.charCodeAt(0)-65248))
    .replace(/丁目|番|号/g,"-")
    .replace(/\s/g,"");
}

/* 候補 */
function showCandidates(t){
  const list=master
    .map(m=>({...m,score:score(t,m.key)}))
    .sort((a,b)=>b.score-a.score)
    .slice(0,3);

  candidates.innerHTML=list.map(c=>`
    <div class="item">${c.address}</div>
  `).join("");
}

/* スコア */
function score(a,b){
  if(a===b) return 100;
  let s=0;

  const na=a.match(/\d+/g)||[];
  const nb=b.match(/\d+/g)||[];

  s+=na.filter(n=>nb.includes(n)).length*10;
  if(b.includes(a)) s+=20;

  return s;
}
</script>

</body>
</html>
