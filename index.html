<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>配達ソート</title>

<style>
body {
  margin: 0;
  font-family: -apple-system;
  background: #f2f2f7;
}
.container { padding: 12px; }

.top-tabs { display:flex; }
.top-tab {
  flex:1;
  padding:12px;
  text-align:center;
  background:#ddd;
}
.top-tab.active { background:#007aff;color:white; }

.hidden { display:none; }

.tabs { display:flex; overflow-x:auto; margin:8px 0; }
.tab {
  padding:8px 12px;
  background:#ddd;
  border-radius:10px;
  margin-right:6px;
}
.tab.active { background:#007aff;color:white; }

.card {
  background:white;
  border-radius:12px;
  padding:10px;
  margin-bottom:10px;
}

input, textarea {
  width:100%;
  padding:10px;
  border:none;
}

textarea { height:90px; }

.item {
  padding:10px;
  border-bottom:1px solid #eee;
  display:flex;
  justify-content:space-between;
}

button {
  width:100%;
  padding:12px;
  border:none;
  border-radius:10px;
  background:#007aff;
  color:white;
  margin-top:6px;
}

.small-btn {
  width:auto;
  padding:6px 10px;
  font-size:12px;
  background:#ff3b30;
}
</style>
</head>

<body>

<div class="container">

<div class="top-tabs">
  <div class="top-tab active" onclick="switchPage('delivery')">🚚 配達</div>
  <div class="top-tab" onclick="switchPage('master')">🛠️ マスタ作成</div>
</div>

<!-- 配達 -->
<div id="deliveryPage">

<div id="tabs" class="tabs"></div>

<div class="card">
  <input id="search" placeholder="住所検索">
  <div id="suggest"></div>
</div>

<div class="card">
  <div id="zoneTitle"></div>
  <div id="result"></div>
</div>

</div>

<!-- マスタ -->
<div id="masterPage" class="hidden">

<div class="card">
  <div>📂 CSVファイル</div>
  <input type="file" id="csvFile">
  <button onclick="importCSVFile()">読み込み</button>
</div>

<div class="card">
  <div>✏️ CSVテキスト</div>
  <textarea id="csvText"></textarea>
  <button onclick="importCSVText()">読み込み</button>
</div>

<div class="card">
  <input id="zoneInput" placeholder="区間">
  <textarea id="addressInput" placeholder="住所（改行で複数）"></textarea>
  <button onclick="addMaster()">追加</button>
</div>

<div class="card" id="masterList"></div>

<button onclick="exportCSV()">CSVコピー</button>

</div>

</div>

<script>

// ===== 状態 =====
let master = [];
let zones = [];
let currentZone = "";
let selected = {};

// ===== ページ切替 =====
function switchPage(p){
  document.getElementById("deliveryPage").classList.toggle("hidden", p!=="delivery");
  document.getElementById("masterPage").classList.toggle("hidden", p!=="master");

  document.querySelectorAll(".top-tab").forEach((t,i)=>{
    t.classList.toggle("active", (p==="delivery"&&i===0)||(p==="master"&&i===1));
  });
}

// ===== CSVパース =====
function parseCSV(text){
  const lines = text.trim().split("\n");
  const header = lines[0].split(",");

  const zi = header.indexOf("zone");
  const oi = header.indexOf("order");
  const ai = header.indexOf("address");

  master = lines.slice(1).map(l=>{
    const c = l.split(",");
    return {
      zone: c[zi]?.trim(),
      order: Number(c[oi]),
      address: c[ai]?.trim()
    };
  }).filter(x=>x.address);

  updateZones();
  renderMaster();
  render();
}

// ===== CSV入力 =====
function importCSVFile(){
  const f = document.getElementById("csvFile").files[0];
  const r = new FileReader();
  r.onload = e=>parseCSV(e.target.result);
  r.readAsText(f);
}

function importCSVText(){
  const t = document.getElementById("csvText").value;
  parseCSV(t);
}

// ===== マスタ追加 =====
function addMaster(){
  const z = document.getElementById("zoneInput").value;
  const lines = document.getElementById("addressInput").value.split("\n");

  lines.forEach(l=>{
    if(l.trim()){
      master.push({
        zone:z,
        address:l.trim(),
        order: master.length+1
      });
    }
  });

  updateZones();
  renderMaster();
}

// ===== 削除 =====
function deleteItem(zone,address){
  master = master.filter(m=>!(m.zone===zone && m.address===address));
  reOrder();
  renderMaster();
}

// ===== 並び替え =====
function renderMaster(){
  const box=document.getElementById("masterList");
  box.innerHTML="";

  master.forEach(m=>{
    const div=document.createElement("div");
    div.className="item";
    div.draggable=true;
    div.innerHTML=`${m.zone} | ${m.address}
      <button class="small-btn" onclick="deleteItem('${m.zone}','${m.address}')">削除</button>`;

    div.ondragstart=()=>div.classList.add("dragging");
    div.ondragend=()=>{div.classList.remove("dragging"); reOrder();};

    div.ondragover=e=>{
      e.preventDefault();
      const dragging=document.querySelector(".dragging");
      if(dragging && dragging!==div){
        box.insertBefore(dragging,div);
      }
    };

    box.appendChild(div);
  });
}

function reOrder(){
  const items=[...document.querySelectorAll("#masterList .item")];

  items.forEach((el,i)=>{
    const txt=el.firstChild.textContent.split(" | ");
    const z=txt[0], a=txt[1];

    const t=master.find(m=>m.zone===z && m.address===a);
    if(t) t.order=i+1;
  });

  master.sort((a,b)=>a.order-b.order);
}

// ===== CSV出力 =====
function exportCSV(){
  let csv="zone,order,address\n";
  master.forEach(m=>{
    csv+=`${m.zone},${m.order},${m.address}\n`;
  });
  navigator.clipboard.writeText(csv);
  alert("コピー完了");
}

// ===== ゾーン =====
function updateZones(){
  zones=[...new Set(master.map(m=>m.zone))];
  currentZone=zones[0];
  renderTabs();
}

function renderTabs(){
  const tabs=document.getElementById("tabs");
  tabs.innerHTML="";
  zones.forEach(z=>{
    const d=document.createElement("div");
    d.className="tab";
    d.textContent=z;
    if(z===currentZone)d.classList.add("active");
    d.onclick=()=>{currentZone=z; render(); renderTabs();};
    tabs.appendChild(d);
  });
}

// ===== 配達 =====
search.addEventListener("input", ()=>{
  const val=search.value;
  suggest.innerHTML="";
  master
    .filter(m=>m.zone===currentZone && m.address.includes(val))
    .slice(0,10)
    .forEach(item=>{
      const d=document.createElement("div");
      d.textContent=item.address;
      d.onclick=()=>addItem(item);
      suggest.appendChild(d);
    });
});

function addItem(item){
  if(!selected[currentZone]) selected[currentZone]=[];
  selected[currentZone].push(item);
  selected[currentZone].sort((a,b)=>a.order-b.order);
  render();
}

function render(){
  result.innerHTML="";
  (selected[currentZone]||[]).forEach((m,i)=>{
    const d=document.createElement("div");
    d.textContent=`${i+1}. ${m.address}`;
    result.appendChild(d);
  });
  zoneTitle.textContent=`配達順（${currentZone||"-"}）`;
}

</script>

</body>
</html>
