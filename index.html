<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>配達ソート</title>

<style>
body {
  margin: 0;
  font-family: -apple-system;
  background: #f2f2f7;
}

.container { padding: 12px; }

.top-tabs {
  display: flex;
  margin-bottom: 10px;
}

.top-tab {
  flex: 1;
  padding: 12px;
  text-align: center;
  background: #ddd;
}

.top-tab.active {
  background: #007aff;
  color: white;
}

.hidden { display: none; }

.tabs {
  display: flex;
  overflow-x: auto;
  margin-bottom: 10px;
}

.tab {
  padding: 8px 12px;
  background: #ddd;
  border-radius: 10px;
  margin-right: 6px;
}

.tab.active { background:#007aff; color:white; }

.card {
  background: white;
  border-radius: 12px;
  padding: 10px;
  margin-bottom: 10px;
}

input, textarea {
  width: 100%;
  padding: 10px;
  border: none;
}

textarea { height: 80px; }

.item {
  padding: 10px;
  border-bottom: 1px solid #eee;
  background: white;
}

.dragging { opacity: 0.5; }

button {
  width: 100%;
  padding: 12px;
  border: none;
  border-radius: 10px;
  background: #007aff;
  color: white;
  margin-top: 6px;
}
</style>
</head>

<body>

<div class="container">

<!-- 上位タブ -->
<div class="top-tabs">
  <div class="top-tab active" onclick="switchPage('delivery')">🚚 配達</div>
  <div class="top-tab" onclick="switchPage('master')">🛠️ マスタ作成</div>
</div>

<!-- 配達画面 -->
<div id="deliveryPage">

<div id="tabs" class="tabs"></div>

<div class="card">
  <input id="search" placeholder="住所検索">
  <div id="suggest"></div>
</div>

<div class="card">
  <div id="zoneTitle"></div>
  <div id="result"></div>
</div>

</div>

<!-- マスタ作成 -->
<div id="masterPage" class="hidden">

<div class="card">
  <input id="zoneInput" placeholder="区間（例:A）">
  <textarea id="addressInput" placeholder="住所を改行で入力"></textarea>
  <button onclick="addMaster()">追加</button>
</div>

<div class="card" id="masterList"></div>

<button onclick="exportCSV()">CSVコピー</button>

</div>

</div>

<script>

// ===== 状態 =====
let master = [];
let zones = [];
let currentZone = "";
let selected = {};

// ===== ページ切替 =====
function switchPage(p){
  document.getElementById("deliveryPage").classList.toggle("hidden", p!=="delivery");
  document.getElementById("masterPage").classList.toggle("hidden", p!=="master");

  document.querySelectorAll(".top-tab").forEach((t,i)=>{
    t.classList.toggle("active", (p==="delivery" && i===0) || (p==="master" && i===1));
  });
}

// ===== マスタ追加 =====
function addMaster(){
  const zone = document.getElementById("zoneInput").value;
  const lines = document.getElementById("addressInput").value.split("\n");

  lines.forEach(l=>{
    if(l.trim()){
      master.push({
        zone,
        address: l.trim(),
        order: master.length+1
      });
    }
  });

  updateZones();
  renderMaster();
}

// ===== ゾーン更新 =====
function updateZones(){
  zones = [...new Set(master.map(m=>m.zone))];
  currentZone = zones[0];
  renderTabs();
}

// ===== タブ =====
function renderTabs(){
  const tabs = document.getElementById("tabs");
  tabs.innerHTML="";

  zones.forEach(z=>{
    const div=document.createElement("div");
    div.className="tab";
    div.textContent=z;

    div.onclick=()=>{
      currentZone=z;
      render();
      renderTabs();
    };

    if(z===currentZone) div.classList.add("active");
    tabs.appendChild(div);
  });
}

// ===== マスタ表示（ドラッグ）=====
function renderMaster(){
  const box = document.getElementById("masterList");
  box.innerHTML="";

  master.forEach((m,i)=>{
    const div=document.createElement("div");
    div.className="item";
    div.draggable=true;
    div.textContent=`${m.zone} | ${m.address}`;

    div.ondragstart=()=>div.classList.add("dragging");
    div.ondragend=()=>{
      div.classList.remove("dragging");
      reOrder();
    };

    div.ondragover=e=>{
      e.preventDefault();
      const dragging=document.querySelector(".dragging");
      if(dragging && dragging!==div){
        box.insertBefore(dragging, div);
      }
    };

    box.appendChild(div);
  });
}

// ===== order再採番 =====
function reOrder(){
  const items=[...document.querySelectorAll("#masterList .item")];

  items.forEach((el,i)=>{
    const text=el.textContent.split(" | ");
    const zone=text[0];
    const address=text[1];

    const target=master.find(m=>m.address===address && m.zone===zone);
    if(target) target.order=i+1;
  });

  master.sort((a,b)=>a.order-b.order);
}

// ===== CSV出力 =====
function exportCSV(){
  let csv="zone,order,address\n";
  master.forEach(m=>{
    csv+=`${m.zone},${m.order},${m.address}\n`;
  });

  navigator.clipboard.writeText(csv);
  alert("コピーした！");
}

// ===== 配達側 =====
document.getElementById("search").addEventListener("input", ()=>{
  const val = search.value;
  const suggest = document.getElementById("suggest");
  suggest.innerHTML="";

  master
    .filter(m=>m.zone===currentZone && m.address.includes(val))
    .slice(0,10)
    .forEach(item=>{
      const d=document.createElement("div");
      d.textContent=item.address;
      d.onclick=()=>addItem(item);
      suggest.appendChild(d);
    });
});

function addItem(item){
  if(!selected[currentZone]) selected[currentZone]=[];
  selected[currentZone].push(item);
  selected[currentZone].sort((a,b)=>a.order-b.order);
  render();
}

function render(){
  const result=document.getElementById("result");
  result.innerHTML="";

  (selected[currentZone]||[]).forEach((m,i)=>{
    const d=document.createElement("div");
    d.textContent=`${i+1}. ${m.address}`;
    result.appendChild(d);
  });

  document.getElementById("zoneTitle").textContent=`配達順（${currentZone||"-"}）`;
}

</script>

</body>
</html>
